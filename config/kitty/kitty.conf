# kitty 配置
# 完整选项参考: https://sw.kovidgoyal.net/kitty/conf/

include current-theme.conf

# === 字体 ===
font_family Maple Mono NF CN
font_size 12.0

# === 透明度 ===
background_opacity 0.8

# === 剪贴板和快捷键 ===
# 选中文字自动复制到剪贴板
copy_on_select yes
# 像 Ghostty 一样：选中文字时复制并取消选中，没选中文字时发送中断信号(SIGINT)
map ctrl+c copy_and_clear_or_interrupt
# Ctrl+V 粘贴
map ctrl+v paste_from_clipboard
